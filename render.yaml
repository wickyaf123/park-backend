# Render blueprint for the parkmed-voice-demo backend.
# Deploy via "New +" → "Blueprint" pointing at this repo, then set
# OPENAI_API_KEY in the dashboard. Other env vars come from this file.

services:
  - type: web
    name: parkmed-voice-demo
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false                    # set in the Render dashboard, never in repo
      - key: OPENAI_REALTIME_MODEL
        value: gpt-4o-realtime-preview-2024-12-17
      - key: ALLOWED_ORIGIN
        value: "*"                     # tighten to the Vercel URL once it's known
